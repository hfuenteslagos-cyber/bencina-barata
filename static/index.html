<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bencina Barata</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root{--g:#10b981;--bg:#0f172a;--c:#1e293b;--b:#334155;--t:#f1f5f9;--m:#94a3b8;--r:#ef4444;--y:#f59e0b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t);height:100dvh;overflow:hidden}

        /* SPLASH */
        #splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px}
        #splash.off{display:none}
        #splash h2{font-size:20px;font-weight:800}
        #splash h2 b{color:var(--g)}
        #splash p{font-size:13px;color:var(--m)}
        .dot{width:5px;height:5px;background:var(--g);border-radius:50%;display:inline-block;animation:p 1.2s ease infinite}
        .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
        @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}

        /* TABS */
        .tabs{display:flex;border-bottom:1px solid var(--b);position:relative;z-index:2}
        .tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border:none;background:var(--bg);color:var(--m);font-family:inherit;border-bottom:3px solid transparent}
        .tab.on{color:var(--g);border-bottom-color:var(--g)}

        /* VIEWS - stacked */
        .views{position:relative;height:calc(100dvh - 48px);overflow:hidden}
        .v{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;overflow:hidden}
        .v.on{display:flex}
        #mv{position:absolute;top:0;left:0;width:100%;height:100%;display:none}
        #mv.on{display:block}
        #map{position:absolute;top:0;left:0;width:100%;height:100%}

        /* CONTROLS */
        .ctrl{padding:8px 12px;border-bottom:1px solid var(--b);display:flex;gap:6px;align-items:center}
        .ctrl select{flex:1;background:var(--c);border:1px solid var(--b);color:var(--t);padding:9px 10px;border-radius:8px;font-size:13px;font-family:inherit;-webkit-appearance:none}
        .gbtn{padding:9px 12px;border:1px solid var(--g);border-radius:8px;background:transparent;color:var(--g);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
        .gbtn.on{background:var(--g);color:#fff}

        /* LIST */
        .ls{flex:1;overflow-y:auto;padding:4px 8px;-webkit-overflow-scrolling:touch}

        /* ROW - ultra compact */
        .row{display:flex;align-items:center;background:var(--c);border-radius:10px;padding:10px 12px;margin-bottom:4px;gap:10px;cursor:pointer;border:2px solid transparent}
        .row.best{border-color:var(--g)}
        .row-info{flex:1;min-width:0}
        .row-brand{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .row-sub{font-size:11px;color:var(--m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .row-price{font-size:18px;font-weight:900;text-align:right;min-width:70px}
        .row-km{font-size:11px;color:var(--m);text-align:right}
        .row-go{padding:6px 12px;border:none;border-radius:7px;background:var(--g);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
        .pl{color:var(--g)}.pm{color:var(--y)}.ph{color:var(--r)}

        /* EMPTY STATE */
        .empty{text-align:center;padding:60px 20px;color:var(--m)}
        .empty h3{font-size:16px;color:var(--t);margin-bottom:8px}
        .empty p{font-size:13px;line-height:1.5}
        .empty button{margin-top:16px;padding:12px 24px;border:none;border-radius:10px;background:var(--g);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

        /* FOOTER */
        .ft{padding:6px 12px;border-top:1px solid var(--b);font-size:10px;color:var(--m);text-align:center}
        .ft a{color:var(--g);text-decoration:none;font-weight:700}

        /* MAP BTNS */
        .mbtns{position:absolute;top:10px;right:10px;z-index:1000;display:flex;flex-direction:column;gap:6px}
        .mb{background:var(--c);border:1px solid var(--b);color:var(--t);width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.4)}

        /* MAP POPUP */
        .leaflet-popup-content-wrapper{background:var(--c)!important;color:var(--t)!important;border-radius:10px!important;box-shadow:0 4px 16px rgba(0,0,0,.5)!important}
        .leaflet-popup-tip{background:var(--c)!important}
        .leaflet-popup-content{margin:10px 14px!important;font-size:13px!important}
        .pn{font-weight:800;font-size:14px;margin-bottom:2px}
        .pa{color:var(--m);font-size:11px;margin-bottom:4px}
        .pp{font-size:20px;font-weight:900;color:var(--g)}
        .pg{display:block;margin-top:6px;padding:8px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;width:100%}
        .mk{background:var(--g);color:#fff;border-radius:5px;padding:2px 5px;font-size:10px;font-weight:800;box-shadow:0 1px 4px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.7);white-space:nowrap}
        .mk.ch{background:#059669;border-color:#34d399;font-size:11px}
        .mk.ex{background:var(--r);border-color:#fca5a5}
        .ud{background:#3b82f6;border-radius:50%;width:14px;height:14px;border:3px solid #fff;box-shadow:0 0 8px rgba(59,130,246,.5)}

        /* LEAFLET FIX */
        .leaflet-control-zoom{display:none}
    </style>
</head>
<body>

<div id="splash">
    <h2>&#9981; Bencina <b>Barata</b></h2>
    <p>Cargando precios <span class="dot"></span> <span class="dot"></span> <span class="dot"></span></p>
</div>

<div class="tabs">
    <button class="tab on" id="t1" onclick="sw('list')">&#9981; Estaciones</button>
    <button class="tab" id="t2" onclick="sw('map')">&#128506; Mapa</button>
</div>

<div class="views">
    <!-- LIST -->
    <div class="v on" id="lv">
        <div class="ctrl">
            <select id="fuel">
                <option value="Gasolina 93">Gasolina 93</option>
                <option value="Gasolina 95">Gasolina 95</option>
                <option value="Gasolina 97">Gasolina 97</option>
                <option value="Diesel">Diesel</option>
                <option value="Kerosene">Kerosene</option>
            </select>
            <button class="gbtn" id="gb" onclick="getGPS()">&#128205; GPS</button>
        </div>
        <div class="ls" id="ls"></div>
        <div class="ft">
            <a href="https://www.bencinaenlinea.cl" target="_blank">CNE</a> &#183;
            Hecho en Tocopilla &#128293; &#183;
            <a href="https://instagram.com/humbertofuentescl" target="_blank">&#128247; @humbertofuentescl</a>
        </div>
    </div>

    <!-- MAP -->
    <div id="mv">
        <div id="map"></div>
        <div class="mbtns">
            <button class="mb" onclick="goMe()">&#128205;</button>
            <button class="mb" onclick="fitAll()">&#127758;</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var D=[],F=[],fuel='Gasolina 93',me=null,srt='price',pMin=0,pMax=0,best=null;
var MK=[],MM={},uM=null,map=null,seen={};

function sw(v){
    var t1=document.getElementById('t1'),t2=document.getElementById('t2');
    var lv=document.getElementById('lv'),mv=document.getElementById('mv');
    t1.classList.remove('on');t2.classList.remove('on');
    lv.classList.remove('on');mv.classList.remove('on');
    if(v==='map'){
        t2.classList.add('on');mv.classList.add('on');
        if(!map)initMap();
        setTimeout(function(){map.invalidateSize();renderMap()},100);
        setTimeout(function(){map.invalidateSize()},300);
        setTimeout(function(){map.invalidateSize()},600);
    }else{
        t1.classList.add('on');lv.classList.add('on');
    }
}

function initMap(){
    map=L.map('map',{center:[-33.45,-70.65],zoom:5,zoomControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.on('click',function(ev){
        me={lat:ev.latlng.lat,lng:ev.latlng.lng};
        placeMe();run();
        document.getElementById('gb').classList.add('on');
    });
}

function load(){
    fetch('/api/estaciones').then(function(r){return r.json()}).then(function(d){
        D=dedupe(d.estaciones||[]);
        if(navigator.geolocation){
            navigator.geolocation.getCurrentPosition(function(p){
                me={lat:p.coords.latitude,lng:p.coords.longitude};
                document.getElementById('gb').classList.add('on');
                run();
                document.getElementById('splash').classList.add('off');
                navigator.geolocation.watchPosition(function(p2){
                    me={lat:p2.coords.latitude,lng:p2.coords.longitude};
                    if(uM&&map)placeMe();
                },function(){},{enableHighAccuracy:true,maximumAge:10000});
            },function(){
                run();
                document.getElementById('splash').classList.add('off');
            },{enableHighAccuracy:true,timeout:8000});
        }else{
            run();document.getElementById('splash').classList.add('off');
        }
    }).catch(function(){
        document.querySelector('#splash p').textContent='Error. Recarga.';
    });
}

// Deduplicate stations by lat+lng+brand
function dedupe(arr){
    var out=[],keys={};
    for(var i=0;i<arr.length;i++){
        var e=arr[i];
        var k=e.lat.toFixed(4)+','+e.lng.toFixed(4)+','+e.distribuidor;
        if(!keys[k]){keys[k]=1;out.push(e)}
    }
    return out;
}

function getGPS(){
    if(!navigator.geolocation)return;
    var btn=document.getElementById('gb');
    btn.textContent='...';
    navigator.geolocation.getCurrentPosition(function(p){
        me={lat:p.coords.latitude,lng:p.coords.longitude};
        btn.classList.add('on');btn.innerHTML='&#128205; GPS';
        run();
        if(map){placeMe();map.setView([me.lat,me.lng],12)}
    },function(){btn.innerHTML='&#128205; GPS'},
    {enableHighAccuracy:true,timeout:8000});
}

function run(){
    fuel=document.getElementById('fuel').value;
    F=[];
    for(var i=0;i<D.length;i++){
        var e=D[i];
        if(!e.precios[fuel]||e.precios[fuel]<800)continue;
        if(me&&dst(e)>80)continue;
        F.push(e);
    }
    if(srt==='price')F.sort(function(a,b){return a.precios[fuel]-b.precios[fuel]});
    else if(srt==='dist'&&me)F.sort(function(a,b){return dst(a)-dst(b)});
    if(F.length){
        pMin=Infinity;pMax=0;
        for(var j=0;j<F.length;j++){
            var pp=F[j].precios[fuel];
            if(pp<pMin)pMin=pp;if(pp>pMax)pMax=pp;
        }
    }
    renderList();
    if(map)renderMap();
}

function pc(p){
    if(pMax===pMin)return 'pl';
    var r=(p-pMin)/(pMax-pMin);
    return r<=.33?'pl':r<=.66?'pm':'ph';
}

function renderList(){
    var el=document.getElementById('ls');
    if(!me){
        el.innerHTML='<div class="empty"><h3>&#128205; Activa tu ubicacion</h3><p>Asi te mostramos las estaciones<br>mas baratas cerca de ti</p><button onclick="getGPS()">Activar GPS</button></div>';
        return;
    }
    if(!F.length){
        el.innerHTML='<div class="empty"><h3>Sin estaciones</h3><p>No hay estaciones con '+fuel+' a 80km</p></div>';
        return;
    }
    var h='';
    var max=F.length>100?100:F.length;
    for(var i=0;i<max;i++){
        var e=F[i],p=e.precios[fuel],km=dst(e).toFixed(1);
        var cheap=i===0&&srt==='price';
        h+='<div class="row'+(cheap?' best':'')+'" onclick="pick(\''+e.id+'\')">';
        h+='<div class="row-info">';
        h+='<div class="row-brand">'+(cheap?'&#127942; ':'')+e.distribuidor+'</div>';
        h+='<div class="row-sub">'+e.comuna+' &#183; '+km+' km</div>';
        h+='</div>';
        h+='<div><div class="row-price '+pc(p)+'">$'+p.toLocaleString('es-CL')+'</div></div>';
        h+='<button class="row-go" onclick="event.stopPropagation();nav('+e.lat+','+e.lng+')">Ir</button>';
        h+='</div>';
    }
    el.innerHTML=h;
}

function renderMap(){
    if(!map)return;
    for(var i=0;i<MK.length;i++)map.removeLayer(MK[i]);
    MK=[];MM={};
    var show=F.length>80?F.slice(0,80):F;
    for(var i=0;i<show.length;i++){
        var e=show[i],p=e.precios[fuel];
        var cls='mk';
        if(i===0&&srt==='price')cls+=' ch';
        else if(pc(p)==='ph')cls+=' ex';
        var icon=L.divIcon({className:'',html:'<div class="'+cls+'">$'+p.toLocaleString('es-CL')+'</div>',iconSize:null,iconAnchor:[22,10]});
        var m=L.marker([e.lat,e.lng],{icon:icon}).addTo(map);
        var popup='<div class="pn">'+e.distribuidor+'</div><div class="pa">'+e.direccion+', '+e.comuna+'</div><div class="pp">$'+p.toLocaleString('es-CL')+'</div>';
        if(me)popup+='<button class="pg" onclick="nav('+e.lat+','+e.lng+')">Ir &#8594;</button>';
        m.bindPopup(popup);
        MK.push(m);MM[e.id]=m;
    }
    placeMe();
    if(me&&!show.length)map.setView([me.lat,me.lng],12);
}

function pick(id){
    var e=null;for(var i=0;i<D.length;i++)if(D[i].id===id){e=D[i];break}
    if(!e)return;
    sw('map');
    setTimeout(function(){
        map.setView([e.lat,e.lng],14);
        if(MM[id])MM[id].openPopup();
    },250);
}

function nav(la,ln){window.open('https://www.google.com/maps/dir/?api=1&destination='+la+','+ln+'&travelmode=driving','_blank')}
function goMe(){if(me&&map)map.setView([me.lat,me.lng],13)}
function fitAll(){
    if(!map||!F.length)return;
    var b=[];var mx=F.length>80?80:F.length;
    for(var i=0;i<mx;i++)b.push([F[i].lat,F[i].lng]);
    map.fitBounds(b,{padding:[15,15]});
}
function placeMe(){
    if(!me||!map)return;
    if(uM)map.removeLayer(uM);
    uM=L.marker([me.lat,me.lng],{icon:L.divIcon({className:'',html:'<div class="ud"></div>',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map);
}

function dst(e){
    if(!me)return 99999;
    var R=6371,dLa=(e.lat-me.lat)*Math.PI/180,dLo=(e.lng-me.lng)*Math.PI/180;
    var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(me.lat*Math.PI/180)*Math.cos(e.lat*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2);
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

document.getElementById('fuel').addEventListener('change',function(){run()});
load();
</script>
</body>
</html>
