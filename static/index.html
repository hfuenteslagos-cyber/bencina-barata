<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bencina Barata Chile</title>
    <meta name="description" content="Encuentra la bencina mas barata en Chile. Precios oficiales CNE actualizados.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Bencina Barata">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#f8f9fa; color:#1a1a1a; height:100dvh; overflow:hidden; }

        .app { display:flex; height:100dvh; }
        .sidebar { width:400px; min-width:400px; display:flex; flex-direction:column; background:#fff; border-right:1px solid #e5e7eb; z-index:1000; }
        .map-area { flex:1; position:relative; }
        #map { height:100%; width:100%; }

        /* Header */
        .header { padding:16px 20px 12px; border-bottom:1px solid #e5e7eb; }
        .header h1 { font-size:18px; font-weight:700; color:#111; }
        .header h1 span { color:#059669; }
        .header-meta { font-size:11px; color:#6b7280; margin-top:2px; }
        .badge { font-size:10px; padding:2px 6px; border-radius:4px; background:#dcfce7; color:#166534; font-weight:600; }

        /* Controls */
        .controls { padding:12px 20px; border-bottom:1px solid #e5e7eb; display:flex; flex-direction:column; gap:8px; }
        .control-row { display:flex; gap:8px; align-items:center; }
        .control-row label { font-size:12px; font-weight:500; color:#6b7280; min-width:70px; }
        select { flex:1; background:#f9fafb; border:1px solid #d1d5db; color:#111; padding:8px 10px; border-radius:8px; font-size:13px; font-family:inherit; }
        select:focus { outline:none; border-color:#059669; }

        .btn-location { width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; background:#f9fafb; color:#374151; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }
        .btn-location:hover { background:#f3f4f6; }
        .btn-location.active { background:#dcfce7; border-color:#86efac; color:#166534; }

        /* Chips */
        .chips { display:flex; gap:4px; flex-wrap:wrap; }
        .chip { font-size:11px; padding:4px 10px; border-radius:16px; border:1px solid #d1d5db; background:#fff; color:#6b7280; cursor:pointer; font-family:inherit; }
        .chip.active { background:#059669; color:#fff; border-color:#059669; }

        /* List */
        .list-header { padding:8px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e5e7eb; }
        .list-header h3 { font-size:13px; font-weight:600; color:#374151; }
        .count { font-size:11px; color:#9ca3af; }
        .sort-btn { font-size:11px; color:#059669; cursor:pointer; background:none; border:none; font-family:inherit; font-weight:600; }
        .list { flex:1; overflow-y:auto; padding:8px 12px; }

        /* Cards */
        .card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:12px; margin-bottom:6px; cursor:pointer; transition:all .15s; }
        .card:hover { border-color:#d1d5db; box-shadow:0 1px 3px rgba(0,0,0,.06); }
        .card.active { border-color:#059669; background:#f0fdf4; }
        .card.cheapest { border-color:#86efac; background:#f0fdf4; }
        .card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .card-name { font-size:13px; font-weight:600; color:#111; }
        .card-brand { font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; text-transform:uppercase; }
        .b-copec { background:#fee2e2; color:#991b1b; }
        .b-shell { background:#fef9c3; color:#854d0e; }
        .b-petrobras { background:#dcfce7; color:#166534; }
        .b-terpel { background:#ffedd5; color:#9a3412; }
        .b-default { background:#f3f4f6; color:#374151; }
        .card-addr { font-size:11px; color:#9ca3af; margin-bottom:6px; }
        .card-prices { display:flex; gap:6px; flex-wrap:wrap; }
        .ptag { font-size:11px; padding:3px 8px; border-radius:6px; background:#f3f4f6; }
        .ptag .type { color:#6b7280; }
        .ptag .val { font-weight:700; color:#111; }
        .ptag.sel { background:#dcfce7; }
        .ptag.sel .val { color:#059669; }
        .cheapest-label { font-size:9px; font-weight:700; color:#059669; text-transform:uppercase; letter-spacing:.5px; }

        .card-dist { margin-top:6px; padding-top:6px; border-top:1px solid #f3f4f6; font-size:11px; color:#6b7280; display:flex; gap:12px; }
        .card-dist strong { color:#111; }

        /* Footer */
        .footer { padding:8px 20px; border-top:1px solid #e5e7eb; font-size:10px; color:#9ca3af; text-align:center; }
        .footer a { color:#059669; text-decoration:none; }

        /* Map buttons */
        .map-btns { position:absolute; top:12px; right:12px; z-index:1000; display:flex; flex-direction:column; gap:6px; }
        .map-btn { background:#fff; border:1px solid #d1d5db; width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
        .map-btn:hover { background:#f9fafb; }

        /* Leaflet popups */
        .leaflet-popup-content-wrapper { border-radius:10px!important; box-shadow:0 2px 10px rgba(0,0,0,.12)!important; }
        .leaflet-popup-content { margin:10px 14px!important; font-family:'Inter',sans-serif!important; font-size:13px!important; }
        .pop-name { font-weight:700; margin-bottom:2px; }
        .pop-addr { color:#6b7280; font-size:11px; margin-bottom:6px; }
        .pop-price { font-size:20px; font-weight:700; color:#059669; }
        .pop-fuel { font-size:11px; color:#6b7280; }
        .pop-nav { display:block; margin-top:8px; padding:6px; background:#059669; color:#fff; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; text-align:center; font-family:inherit; width:100%; }

        .marker-label { background:#fff; color:#111; border-radius:6px; padding:3px 7px; font-size:11px; font-weight:700; font-family:'Inter',sans-serif; box-shadow:0 1px 4px rgba(0,0,0,.15); border:1px solid #e5e7eb; text-align:center; white-space:nowrap; }
        .marker-label.cheap { background:#059669; color:#fff; border-color:#059669; }
        .marker-label.expensive { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
        .user-dot { background:#3b82f6; border-radius:50%; width:14px; height:14px; border:2px solid #fff; box-shadow:0 1px 4px rgba(59,130,246,.4); }

        /* Loading */
        .loading { position:fixed; inset:0; background:#fff; display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; gap:12px; }
        .loading.hidden { display:none; }
        .loading-spinner { width:32px; height:32px; border:3px solid #e5e7eb; border-top-color:#059669; border-radius:50%; animation:spin .7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading-text { font-size:13px; color:#6b7280; }

        /* Mobile */
        .mobile-tabs { display:none; }
        @media (max-width:768px) {
            .app { flex-direction:column; position:relative; }
            .sidebar { width:100%; min-width:unset; height:100%; position:absolute; bottom:0; left:0; right:0; z-index:1001; transition:transform .3s; }
            .sidebar.collapsed { transform:translateY(calc(100% - 48px)); }
            .map-area { height:100%; }
            .mobile-tabs { display:flex; background:#fff; border-bottom:1px solid #e5e7eb; }
            .mob-tab { flex:1; padding:13px; text-align:center; font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; color:#9ca3af; font-family:inherit; border-bottom:2px solid transparent; }
            .mob-tab.active { color:#059669; border-bottom-color:#059669; }
            .header { padding:12px 16px 10px; }
            .controls { padding:10px 16px; }
        }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando precios...</div>
</div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="mobile-tabs">
            <button class="mob-tab active" onclick="showTab('list')">Lista</button>
            <button class="mob-tab" onclick="showTab('map')">Mapa</button>
        </div>

        <div class="header">
            <h1>Bencina <span>Barata</span></h1>
            <div class="header-meta">
                Chile <span class="badge" id="badge">...</span>
            </div>
        </div>

        <div class="controls">
            <div class="control-row">
                <label>Region</label>
                <select id="regionSel">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="control-row">
                <label>Combustible</label>
                <select id="fuelType">
                    <option value="Gasolina 93">Gasolina 93</option>
                    <option value="Gasolina 95">Gasolina 95</option>
                    <option value="Gasolina 97">Gasolina 97</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Kerosene">Kerosene</option>
                </select>
            </div>
            <button class="btn-location" id="btnLoc" onclick="getLocation()">Usar mi ubicacion</button>
            <div class="chips" id="chips"></div>
        </div>

        <div class="list-header">
            <h3>Estaciones <span class="count" id="count"></span></h3>
            <button class="sort-btn" id="sortBtn" onclick="toggleSort()">Precio</button>
        </div>
        <div class="list" id="list"></div>

        <div class="footer">
            Fuente: <a href="https://www.bencinaenlinea.cl" target="_blank">CNE</a> &middot; Actualizado cada hora
        </div>
    </div>

    <div class="map-area">
        <div id="map"></div>
        <div class="map-btns">
            <button class="map-btn" onclick="map.setView([-33.45,-70.65],5)" title="Ver Chile">&#127758;</button>
            <button class="map-btn" onclick="refreshData()" title="Actualizar">&#8635;</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let all=[], filtered=[], fuel='Gasolina 93', loc=null, sort='price', sel=null, activeC=null, activeR='';
let markers=[], mMap={}, userM=null;

// Mobile
function showTab(t){
    const s=document.getElementById('sidebar'), tabs=document.querySelectorAll('.mob-tab');
    tabs.forEach(x=>x.classList.remove('active'));
    if(t==='map'){s.classList.add('collapsed');tabs[1].classList.add('active');setTimeout(()=>map.invalidateSize(),300);}
    else{s.classList.remove('collapsed');tabs[0].classList.add('active');}
}

// Map - Chile center
const map=L.map('map',{center:[-33.45,-70.65],zoom:5,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM',maxZoom:19}).addTo(map);

// Fetch
async function fetchData(){
    try{
        const r=await fetch('/api/estaciones'), d=await r.json();
        all=d.estaciones||[];
        const b=document.getElementById('badge');
        b.textContent=d.source==='fallback'?'Referencia':`${all.length} estaciones`;
        buildRegions(); buildChips(); apply();
        document.getElementById('loading').classList.add('hidden');
    }catch(e){document.querySelector('.loading-text').textContent='Error cargando datos.';}
}

async function refreshData(){
    document.getElementById('loading').classList.remove('hidden');
    document.querySelector('.loading-text').textContent='Actualizando...';
    try{const r=await fetch('/api/refresh'),d=await r.json();all=d.estaciones||[];buildRegions();buildChips();apply();}catch(e){}
    document.getElementById('loading').classList.add('hidden');
}

// Regions
function buildRegions(){
    const rs=[...new Set(all.map(e=>e.region).filter(Boolean))].sort();
    const s=document.getElementById('regionSel');
    s.innerHTML='<option value="">Todas las regiones</option>'+rs.map(r=>`<option value="${r}" ${activeR===r?'selected':''}>${r}</option>`).join('');
}

// Filters
function apply(){
    fuel=document.getElementById('fuelType').value;
    activeR=document.getElementById('regionSel').value;
    filtered=all.filter(e=>{
        if(!e.precios[fuel]) return false;
        if(activeR&&e.region!==activeR) return false;
        if(activeC&&e.comuna!==activeC) return false;
        return true;
    });
    if(sort==='price') filtered.sort((a,b)=>a.precios[fuel]-b.precios[fuel]);
    else if(sort==='dist'&&loc) filtered.sort((a,b)=>dist(a)-dist(b));
    else filtered.sort((a,b)=>a.nombre.localeCompare(b.nombre));
    render(); renderMap();
}

function buildChips(){
    const base=activeR?all.filter(e=>e.region===activeR):all;
    const cs=[...new Set(base.map(e=>e.comuna).filter(Boolean))].sort();
    document.getElementById('chips').innerHTML=
        `<button class="chip ${!activeC?'active':''}" onclick="setC(null)">Todas</button>`+
        cs.map(c=>`<button class="chip ${activeC===c?'active':''}" onclick="setC('${c}')">${c}</button>`).join('');
}
function setC(c){activeC=c;buildChips();apply();}

function toggleSort(){
    const b=document.getElementById('sortBtn');
    if(sort==='price'){sort=loc?'dist':'name';b.textContent=loc?'Distancia':'Nombre';}
    else if(sort==='dist'){sort='name';b.textContent='Nombre';}
    else{sort='price';b.textContent='Precio';}
    apply();
}

// Render list
function render(){
    const c=document.getElementById('list');
    document.getElementById('count').textContent=`(${filtered.length})`;
    if(!filtered.length){c.innerHTML='<div style="text-align:center;padding:40px;color:#9ca3af">Sin resultados</div>';return;}
    c.innerHTML=filtered.map((e,i)=>{
        const p=e.precios[fuel], cheap=i===0&&sort==='price', act=sel&&sel.id===e.id;
        const bc=brand(e.distribuidor);
        const prices=Object.entries(e.precios).map(([t,v])=>{
            const s=t===fuel;
            return `<span class="ptag ${s?'sel':''}"><span class="type">${t.replace('Gasolina ','G')}</span> <span class="val">$${v.toLocaleString('es-CL')}</span></span>`;
        }).join('');
        let di='';
        if(loc){const km=dist(e).toFixed(1);di=`<div class="card-dist"><span><strong>${km}</strong> km</span><a href="https://www.google.com/maps/dir/?api=1&destination=${e.lat},${e.lng}&travelmode=driving" target="_blank" style="margin-left:auto;color:#059669;font-weight:600;text-decoration:none;font-size:12px">Ir &rarr;</a></div>`;}
        return `<div class="card ${cheap?'cheapest':''} ${act?'active':''}" onclick="pick('${e.id}')" id="c-${e.id}">
            ${cheap?'<div class="cheapest-label">Mas barata</div>':''}
            <div class="card-top"><span class="card-name">${e.distribuidor}</span><span class="card-brand ${bc}">${e.distribuidor}</span></div>
            <div class="card-addr">${e.direccion} &middot; ${e.comuna}</div>
            <div class="card-prices">${prices}</div>${di}</div>`;
    }).join('');
}

// Render map
function renderMap(){
    markers.forEach(m=>map.removeLayer(m));markers=[];mMap={};
    if(!filtered.length) return;
    const ps=filtered.map(e=>e.precios[fuel]), mx=Math.max(...ps);
    filtered.forEach((e,i)=>{
        const p=e.precios[fuel];
        let cls='marker-label';
        if(i===0&&sort==='price') cls+=' cheap';
        else if(p>=mx*.98) cls+=' expensive';
        const icon=L.divIcon({className:'',html:`<div class="${cls}">$${p.toLocaleString('es-CL')}</div>`,iconSize:null,iconAnchor:[30,15]});
        const m=L.marker([e.lat,e.lng],{icon}).addTo(map);
        const dStr=loc?`<br><small>${dist(e).toFixed(1)} km</small>`:'';
        m.bindPopup(`<div class="pop-name">${e.distribuidor}</div><div class="pop-addr">${e.direccion}, ${e.comuna}</div><div class="pop-price">$${p.toLocaleString('es-CL')}</div><div class="pop-fuel">${fuel}${dStr}</div>${loc?`<button class="pop-nav" onclick="navTo(${e.lat},${e.lng})">Ir con Google Maps</button>`:''}`);
        m.on('click',()=>pick(e.id));
        markers.push(m);mMap[e.id]=m;
    });
}

function pick(id){
    const e=all.find(x=>x.id===id);if(!e)return;
    sel=e;
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
    const card=document.getElementById(`c-${id}`);
    if(card){card.classList.add('active');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
    map.setView([e.lat,e.lng],Math.max(map.getZoom(),13));
    if(mMap[id]) mMap[id].openPopup();
    if(window.innerWidth<=768) showTab('map');
}

function navTo(lat,lng){window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`,'_blank');}

// Location - tiempo real
let watchId=null;
function getLocation(){
    const b=document.getElementById('btnLoc');
    if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null;loc=null;if(userM){map.removeLayer(userM);userM=null;}b.textContent='Usar mi ubicacion';b.classList.remove('active');apply();return;}
    b.textContent='Obteniendo...';
    if(!navigator.geolocation){b.textContent='No disponible';return;}
    watchId=navigator.geolocation.watchPosition(p=>{
        loc={lat:p.coords.latitude,lng:p.coords.longitude};
        b.textContent='GPS activo';b.classList.add('active');
        if(userM)map.removeLayer(userM);
        userM=L.marker([loc.lat,loc.lng],{icon:L.divIcon({className:'',html:'<div class="user-dot"></div>',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map);
        apply();
    },()=>{b.textContent='Usar mi ubicacion';alert('No se pudo obtener ubicacion');},{enableHighAccuracy:true,timeout:15000,maximumAge:5000});
}

map.on('click',function(e){
    loc={lat:e.latlng.lat,lng:e.latlng.lng};
    const b=document.getElementById('btnLoc');
    b.textContent='Posicion en mapa';b.classList.add('active');
    if(userM)map.removeLayer(userM);
    userM=L.marker([loc.lat,loc.lng],{icon:L.divIcon({className:'',html:'<div class="user-dot"></div>',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map);
    apply();
});

// Utils
function dist(e){
    if(!loc) return Infinity;
    const R=6371,dLat=(e.lat-loc.lat)*Math.PI/180,dLng=(e.lng-loc.lng)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(loc.lat*Math.PI/180)*Math.cos(e.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function brand(b){
    const l=(b||'').toLowerCase();
    if(l.includes('copec'))return 'b-copec';if(l.includes('shell'))return 'b-shell';
    if(l.includes('petrobras')||l.includes('enex'))return 'b-petrobras';if(l.includes('terpel'))return 'b-terpel';
    return 'b-default';
}

document.getElementById('fuelType').addEventListener('change',apply);
document.getElementById('regionSel').addEventListener('change',()=>{activeC=null;buildChips();apply();});
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
fetchData();
</script>
</body>
</html>
